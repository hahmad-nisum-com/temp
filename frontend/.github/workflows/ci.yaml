name: Docker Build & Run (Local)

on:
  workflow_dispatch:
    inputs: {}
  push:
    branches:
      - main
      - feature/devops

jobs:
  build-and-run:
    runs-on: boilerplate-fe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Stop & Remove Existing Container (if running)
        run: |
          CONTAINER_ID=$(docker ps -aq -f name=boilerplate-fe)

          if [ -n "$CONTAINER_ID" ]; then
              echo "Found container: $CONTAINER_ID"
              echo "Stopping container (if running)..."
              docker stop boilerplate-fe || echo "Container already stopped."

              echo "Removing container..."
              docker rm boilerplate-fe || echo "Container already removed."
          else
              echo "No container named boilerplate-fe found."
          fi

      - name: Remove Old Image (if exists)
        run: |
          if [ "$(docker images -q boilerplate-fe:1.0)" ]; then
            echo "Removing old Docker image..."
            docker rmi boilerplate-fe:1.0 --force
          else
            echo "No existing image found, skipping removal."
          fi

      - name: Build Docker Image
        run: docker build --no-cache -t boilerplate-fe:1.0 .

      - name: Run Docker Container
        run: |
          docker run -d \
            --rm \
            --name boilerplate-fe \
            --network host \
            -p 80:80 \
            boilerplate-fe:1.0

      - name: Cleanup Unused Docker Resources
        run: docker system prune -af
