spring:
  profiles:
    active: local

  application:
    name: boilerplate-websocket

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

feign:
  circuitbreaker:
    enabled: true
  retry:
    max: 1
    interval: 2000

resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: 60s
