<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9; font-family: Arial, sans-serif;">

<div style="max-width: 600px; margin: 40px auto; background-color: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 style="color: #7b9e7e;">Password Reset Requested</h2>
  </div>

  <p style="font-size: 16px; color: #444;">
    Dear <span th:text="${username}">User</span>,
  </p>

  <p style="font-size: 15px; color: #444;">
    Below is your password reset link. This link is valid for <strong>24 hours</strong>.
  </p>

  <p style="word-break: break-all; font-size: 16px; background-color: #f0f0f0; padding: 10px; border-radius: 4px; color: #00205F;" th:text="${reset_password_link}">
  </p>

  <p style="font-size: 15px; color: #777;">
    If you did not request a password reset, please ignore this email or contact our support team.
  </p>

  <p style="font-size: 14px; color: #aaa; margin-top: 40px;">
    — The Boilerplate User Team
  </p>
</div>

<div style="text-align: center; padding: 20px; background-color: #00205F; color: white;">
  <p style="margin: 0;">&copy; 2025 Boilerplate User. All rights reserved.</p>
</div>

</body>
</html>
