<div style="max-width: 600px; margin: 40px auto; background-color: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 style="color: #7b9e7e;">Welcome to Boilerplate!</h2>
    <p style="font-size: 16px; color: #555;">
      We're thrilled to have you join our family. 🎉
    </p>
  </div>

  <p style="font-size: 15px; color: #444;">
    Your login credentials are below. Please keep them safe.
  </p>

  <div style="background-color: #f1f1f1; padding: 20px; border-radius: 5px; margin-top: 20px; font-size: 14px;">
    <p><strong>Email (Username):</strong> <span th:text="${email}">user@example.com</span></p>
    <p><strong>Password:</strong> <span th:text="${password}">********</span></p>
  </div>

  <p style="font-size: 14px; color: #aaa; margin-top: 40px;">
    — The Boilerplate User Team
  </p>
</div>
