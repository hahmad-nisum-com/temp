<!-- src/main/resources/templates/promotion-email.html -->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Special Promotion</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9; font-family: Arial, sans-serif;">

<div style="max-width: 600px; margin: 40px auto; background-color: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.05);">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2 style="color: #7b9e7e;">Hello, <span th:text="${username}">User</span>!</h2>
    <p style="font-size: 16px; color: #555;">
      🎁 Enjoy exclusive offers this week from Boilerplate!
    </p>
  </div>

  <p style="font-size: 15px; color: #444;">
    We’ve got amazing new features and discounts just for you. Don’t miss out on what’s coming this week!
  </p>

  <p style="font-size: 15px; color: #444;">
    <a th:href="${unsubscribeUrl}" style="display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #e74c3c; color: #fff; text-decoration: none; border-radius: 5px;">Unsubscribe</a>
  </p>

  <p style="font-size: 14px; color: #aaa; margin-top: 40px;">
    — The Boilerplate Team
  </p>
</div>

<div style="text-align: center; padding: 20px; background-color: #00205F; color: white;">
  <p style="margin: 0;">&copy; 2025 Boilerplate User. All rights reserved.</p>
</div>

</body>
</html>
